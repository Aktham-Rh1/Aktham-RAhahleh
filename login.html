<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول</title>
  <style>
    body { font-family:
       "Tahoma", sans-serif;
     background-color: #f5f5f5; direction: rtl; text-align: center; padding: 50px; }
    .login-box { background: white; padding: 30px; border-radius: 8px; width: 300px; margin: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
    button { background-color: #2e8b57; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background-color: #1c5c3c; }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>تسجيل الدخول</h2>
    <form action="Ak.php" method="POST" onsubmit="return validateLogin()">
      <input type="text" id="username" name="username" placeholder="اسم المستخدم (أرقام فقط)" required>
      <input type="password" id="password" name="password" placeholder="كلمة السر" required>
      <button type="submit">دخول</button>
    </form>
  </div>

  <script>
    function validateLogin() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const regex = /^[0-9]+$/;
      if (!regex.test(username)) {
        alert("اسم المستخدم يجب أن يكون أرقاماً فقط");
        return false;
      }
      if (password.length < 4) {
        alert("كلمة السر يجب أن تكون 4 أحرف على الأقل");
        return false;
      }
      return true; // سيتم إرسال البيانات لملف Ak.php الآن
    }
  </script>

</body>
</html>
