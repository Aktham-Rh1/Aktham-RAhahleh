<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>قراءات الرطوبة</title>
  <style>
    body { font-family: Tahoma; direction: rtl; background: #f5f5f5; padding: 20px; text-align: center;}
    .container { background: white; padding: 20px; display: inline-block; border-radius: 10px; }
    input { display: block; margin: 10px auto; padding: 8px; width: 250px; }
    button { padding: 10px 20px; background: #2e8b57; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>إرسال القراءات</h1>
  <div class="container">
    <form id="sensorForm">
      <label>اسم العميل:</label>
      <input type="text" id="clientName" required>

      <label>رقم الهاتف:</label>
      <input type="number" id="clientPhone" required>

      <label>قراءة الرطوبة (%):</label>
      <input type="number" id="humidity" required>

      <button type="submit">إرسال القراءة للسحاب</button>
    </form>
  </div>

  <script type="module">
    // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDFEMzlFW6QNzmekej0EIC6CywEXMITJuA",
  authDomain: "myproject-6d86a.firebaseapp.com",
  databaseURL: "https://myproject-6d86a-default-rtdb.firebaseio.com",
  projectId: "myproject-6d86a",
  storageBucket: "myproject-6d86a.firebasestorage.app",
  messagingSenderId: "1090880882223",
  appId: "1:1090880882223:web:dc4732699873d9762268da",
  measurementId: "G-4SJ8SNF7ZL"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

    // استخدم نفس إعدادات Firebase هنا أيضاً
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
      projectId: "YOUR_PROJECT_ID",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    document.getElementById("sensorForm").onsubmit = function(e) {
      e.preventDefault();
      
      const data = {
        name: document.getElementById("clientName").value,
        phone: document.getElementById("clientPhone").value,
        humidity: document.getElementById("humidity").value,
        time: new Date().toLocaleString()
      };

      push(ref(db, 'readings'), data).then(() => {
        alert("تم إرسال القراءة للـ Firebase بنجاح!");
        document.getElementById("sensorForm").reset();
      });
    };
  </script>
</body>
</html>
