<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>قراءات الرطوبة للعملاء</title>
  <style>
    body { font-family: Tahoma; direction: rtl; background: #f5f5f5; padding: 20px; }
    h1 { color: #2e8b57; }
    label { display: block; margin-top: 10px; }
    input { padding: 5px; margin-top: 5px; width: 250px; }
    button { margin-top: 15px; padding: 10px 20px; background: #2e8b57; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>إرسال قراءات الرطوبة</h1>
  
  <form id="sensorForm">
    <label>اسم العميل:</label>
    <input type="text" id="clientName" required>

    <label>رقم الهاتف:</label>
    <input type="number" id="humidity" required>

    <label>قراءة الرطوبة (%):</label>
    <input type="number" id="humidity" required>

    <button type="submit">إرسال القراءة</button>
  </form>

  <script>
    document.getElementById("sensorForm").addEventListener("submit", function(e){
      e.preventDefault();

      const data = {
        name: document.getElementById("clientName").value,
        phone: document.getElementById("clientPhone").value,
        humidity: document.getElementById("humidity").value
      };

      // إرسال البيانات إلى الخادم (API)
      fetch("https://aktham121232@gmail.com/send-email", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      })
      .then(res => res.json())
      .then(response => {
        alert("تم إرسال القراءة بنجاح!");
      })
      .catch(err => {
        alert("حدث خطأ أثناء الإرسال");
      });
    });
  </script>
</body>
</html>
